<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #ffffff;
      touch-action: none;
    }
    #score {
      font-size: 24px;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    #gameCanvas {
      display: block;
      background-color: #111111;
      border: 2px solid #333333;
    }
    #overlay {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.82);
      border: 2px solid #444;
      border-radius: 10px;
      padding: 32px 40px;
      text-align: center;
      z-index: 10;
    }
    #overlay h2 {
      font-size: 32px;
      margin-bottom: 12px;
      color: #ff4444;
    }
    #overlay p {
      font-size: 20px;
      margin-bottom: 24px;
      color: #ffffff;
    }
    #restartBtn {
      background-color: #4caf50;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 18px;
      border-radius: 6px;
      cursor: pointer;
    }
    #restartBtn:hover {
      background-color: #45a049;
    }
    #wrapper {
      position: relative;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <div id="wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="overlay">
      <h2>Game Over</h2>
      <p id="finalScore">Score: 0</p>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  <script>
    const CANVAS_SIZE = 400;
    const CELL_SIZE = 20;
    const COLS = CANVAS_SIZE / CELL_SIZE; // 20
    const ROWS = CANVAS_SIZE / CELL_SIZE; // 20
    const FPS = 10;
    const INTERVAL_MS = 1000 / FPS;
    const GRACE_PERIOD_MS = 2000;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const overlay = document.getElementById('overlay');
    const finalScoreEl = document.getElementById('finalScore');
    const restartBtn = document.getElementById('restartBtn');

    let snake, direction, nextDirection, food, score, gameInterval, gameRunning;
    let graceStart;

    function initGame() {
      // Start snake with head at x:6, y:10 moving right, tail at x:2
      snake = [
        { x: 2, y: 10 },
        { x: 3, y: 10 },
        { x: 4, y: 10 },
        { x: 5, y: 10 },
        { x: 6, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = 'Score: 0';
      overlay.style.display = 'none';
      graceStart = Date.now();
      spawnFood();
      gameRunning = true;
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(gameStep, INTERVAL_MS);
    }

    function spawnFood() {
      let pos;
      let attempts = 0;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
        attempts++;
      } while (attempts < 400 && snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function gameStep() {
      if (!gameRunning) return;

      direction = { x: nextDirection.x, y: nextDirection.y };

      const head = snake[snake.length - 1];
      const newHead = {
        x: head.x + direction.x,
        y: head.y + direction.y
      };

      const inGrace = (Date.now() - graceStart) < GRACE_PERIOD_MS;

      if (inGrace) {
        // Wrap instead of ending game on wall collision
        if (newHead.x < 0) newHead.x = COLS - 1;
        if (newHead.x >= COLS) newHead.x = 0;
        if (newHead.y < 0) newHead.y = ROWS - 1;
        if (newHead.y >= ROWS) newHead.y = 0;
        // Self-collision is also suppressed during grace period
      } else {
        // Wall collision
        if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
          endGame();
          return;
        }

        // Self collision
        if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
          endGame();
          return;
        }
      }

      snake.push(newHead);

      // Food collision
      if (newHead.x === food.x && newHead.y === food.y) {
        score++;
        scoreEl.textContent = 'Score: ' + score;
        spawnFood();
      } else {
        snake.shift();
      }

      draw();
    }

    function draw() {
      ctx.fillStyle = '#111111';
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      // Draw food
      ctx.fillStyle = '#e53935';
      ctx.fillRect(
        food.x * CELL_SIZE + 1,
        food.y * CELL_SIZE + 1,
        CELL_SIZE - 2,
        CELL_SIZE - 2
      );

      // Draw snake
      ctx.fillStyle = '#4caf50';
      for (const seg of snake) {
        ctx.fillRect(
          seg.x * CELL_SIZE + 1,
          seg.y * CELL_SIZE + 1,
          CELL_SIZE - 2,
          CELL_SIZE - 2
        );
      }
    }

    function endGame() {
      gameRunning = false;
      clearInterval(gameInterval);
      finalScoreEl.textContent = 'Score: ' + score;
      overlay.style.display = 'block';
    }

    // Keyboard controls
    document.addEventListener('keydown', function(e) {
      switch (e.key) {
        case 'ArrowUp':
          if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
          e.preventDefault();
          break;
        case 'ArrowDown':
          if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
          e.preventDefault();
          break;
        case 'ArrowLeft':
          if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
          e.preventDefault();
          break;
        case 'ArrowRight':
          if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
          e.preventDefault();
          break;
      }
    });

    // Touch / swipe controls
    let touchStartX = 0;
    let touchStartY = 0;
    const SWIPE_THRESHOLD = 20;

    canvas.addEventListener('touchstart', function(e) {
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, { passive: true });

    canvas.addEventListener('touchend', function(e) {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;

      if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        // Horizontal swipe
        if (dx > 0) {
          if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
        } else {
          if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
        }
      } else {
        // Vertical swipe
        if (dy > 0) {
          if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
        } else {
          if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
        }
      }
    }, { passive: true });

    restartBtn.addEventListener('click', initGame);
    restartBtn.addEventListener('touchend', function(e) {
      e.preventDefault();
      initGame();
    });

    // Start immediately
    initGame();
    draw();
  </script>
</body>
</html>
