<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      color: #fff;
    }
    #score {
      font-size: 24px;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }
    canvas {
      display: block;
      background-color: #1a1a1a;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <script>
    const CANVAS_SIZE = 400;
    const CELL_SIZE = 20;
    const COLS = CANVAS_SIZE / CELL_SIZE;
    const ROWS = CANVAS_SIZE / CELL_SIZE;
    const FPS = 10;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    let snake, dir, nextDir, food, score, gameOver, intervalId;

    function initGame() {
      const startX = 10;
      const startY = 10;
      snake = [];
      for (let i = 4; i >= 0; i--) {
        snake.push({ x: startX - i, y: startY });
      }
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      scoreEl.textContent = 'Score: 0';
      spawnFood();
    }

    function spawnFood() {
      let pos;
      do {
        pos = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
      } while (snake.some(seg => seg.x === pos.x && seg.y === pos.y));
      food = pos;
    }

    function update() {
      if (gameOver) return;

      dir = { x: nextDir.x, y: nextDir.y };

      const head = snake[snake.length - 1];
      const newHead = { x: head.x + dir.x, y: head.y + dir.y };

      if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        endGame();
        return;
      }

      if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
        endGame();
        return;
      }

      snake.push(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        score++;
        scoreEl.textContent = 'Score: ' + score;
        spawnFood();
      } else {
        snake.shift();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      ctx.fillStyle = '#00cc44';
      for (const seg of snake) {
        ctx.fillRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
      }

      ctx.fillStyle = '#ff3333';
      ctx.fillRect(food.x * CELL_SIZE + 1, food.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);

      if (gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
        ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 36px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Game Over', CANVAS_SIZE / 2, 155);

        ctx.font = '22px system-ui, sans-serif';
        ctx.fillText('Score: ' + score, CANVAS_SIZE / 2, 200);

        const btnX = CANVAS_SIZE / 2 - 70;
        const btnY = 230;
        const btnW = 140;
        const btnH = 44;

        ctx.fillStyle = '#00cc44';
        ctx.beginPath();
        ctx.roundRect(btnX, btnY, btnW, btnH, 8);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 20px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Restart', CANVAS_SIZE / 2, btnY + 29);
      }
    }

    function loop() {
      update();
      draw();
    }

    function endGame() {
      gameOver = true;
      draw();
    }

    function startLoop() {
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(loop, 1000 / FPS);
    }

    function restart() {
      initGame();
      startLoop();
    }

    document.addEventListener('keydown', function(e) {
      switch (e.key) {
        case 'ArrowUp':
          if (dir.y !== 1) nextDir = { x: 0, y: -1 };
          e.preventDefault();
          break;
        case 'ArrowDown':
          if (dir.y !== -1) nextDir = { x: 0, y: 1 };
          e.preventDefault();
          break;
        case 'ArrowLeft':
          if (dir.x !== 1) nextDir = { x: -1, y: 0 };
          e.preventDefault();
          break;
        case 'ArrowRight':
          if (dir.x !== -1) nextDir = { x: 1, y: 0 };
          e.preventDefault();
          break;
      }
    });

    let touchStartX = 0;
    let touchStartY = 0;
    const SWIPE_THRESHOLD = 30;

    canvas.addEventListener('touchstart', function(e) {
      e.preventDefault();
      const touch = e.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', function(e) {
      e.preventDefault();
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (gameOver) {
        const rect = canvas.getBoundingClientRect();
        const tapX = touch.clientX - rect.left;
        const tapY = touch.clientY - rect.top;
        const scaleX = CANVAS_SIZE / rect.width;
        const scaleY = CANVAS_SIZE / rect.height;
        const cx = tapX * scaleX;
        const cy = tapY * scaleY;
        const btnX = CANVAS_SIZE / 2 - 70;
        const btnY = 230;
        const btnW = 140;
        const btnH = 44;
        if (cx >= btnX && cx <= btnX + btnW && cy >= btnY && cy <= btnY + btnH) {
          restart();
        }
        return;
      }

      if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) {
          if (dir.x !== -1) nextDir = { x: 1, y: 0 };
        } else {
          if (dir.x !== 1) nextDir = { x: -1, y: 0 };
        }
      } else {
        if (dy > 0) {
          if (dir.y !== -1) nextDir = { x: 0, y: 1 };
        } else {
          if (dir.y !== 1) nextDir = { x: 0, y: -1 };
        }
      }
    }, { passive: false });

    canvas.addEventListener('click', function(e) {
      if (!gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = CANVAS_SIZE / rect.width;
      const scaleY = CANVAS_SIZE / rect.height;
      const cx = (e.clientX - rect.left) * scaleX;
      const cy = (e.clientY - rect.top) * scaleY;
      const btnX = CANVAS_SIZE / 2 - 70;
      const btnY = 230;
      const btnW = 140;
      const btnH = 44;
      if (cx >= btnX && cx <= btnX + btnW && cy >= btnY && cy <= btnY + btnH) {
        restart();
      }
    });

    initGame();
    startLoop();
  </script>
</body>
</html>
